apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambulance-management-ambulance-ufe-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      pod: ambulance-management-ambulance-ufe-label
  template:
    metadata:
      labels:
        pod: ambulance-management-ambulance-ufe-label
    spec:
      containers:
        - name: ambulance-management-ambulance-ufe-container
          image: olafser/ambulance-management-ui
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          resources:
            requests:
              memory: "32M"
              cpu: "0.1"
            limits:
              memory: "320M"
              cpu: "0.3"