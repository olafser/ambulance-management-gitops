apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wac-hospital  # chceme tieto objekty umiestniť do `wac-hospital` namespace
                         # tento zapis preťaží hodnoty "namespace" vo všetkých objektoch
labels:
- pairs:
    app.kubernetes.io/part-of: wac-hospital

resources:
- ../../../apps/ambulance-management-ambulance-ufe
- ../../../apps/ambulance-management-webapi

patches:
  - path: patches/ambulance-management-webapi.service.yaml

components:
  - ../../../components/version-developers
  - https://github.com/olafser/ambulance-management-api-app//deployments/kustomize/components/mongodb